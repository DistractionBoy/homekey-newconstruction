<svg viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Map of Northern Virginia communities">
  <!-- NoVA region outline (Loudoun, Fairfax, Prince William — stylized) -->
  <path d="M15,20 L95,8 L165,22 L175,50 L168,90 L140,118 L95,128 L50,120 L20,95 L10,60 Z"
        stroke="#cbd5e1" stroke-width="1.5" fill="#f8fafc"/>
  <!-- County boundary hints -->
  <path d="M95,8 L95,128" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M10,65 L175,58" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Community dots -->
  <!-- Leesburg -->
  <circle cx="42" cy="28" r="5" fill="#f97316"/>
  <text x="42" y="20" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Leesburg</text>
  <!-- Brambleton -->
  <circle cx="72" cy="55" r="5" fill="#f97316"/>
  <text x="72" y="47" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Brambleton</text>
  <!-- Ashburn -->
  <circle cx="110" cy="35" r="5" fill="#f97316"/>
  <text x="110" y="27" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Ashburn</text>
  <!-- Dulles South -->
  <circle cx="130" cy="60" r="5" fill="#f97316"/>
  <text x="147" y="64" text-anchor="start" font-size="8" fill="#64748b" font-family="system-ui">Dulles S.</text>
  <!-- Oak Hill -->
  <circle cx="148" cy="78" r="5" fill="#f97316"/>
  <text x="148" y="70" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Oak Hill</text>
  <!-- Haymarket -->
  <circle cx="75" cy="100" r="5" fill="#f97316"/>
  <text x="75" y="92" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Haymarket</text>
  <!-- Gainesville -->
  <circle cx="100" cy="88" r="5" fill="#f97316"/>
  <text x="100" y="80" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Gainesville</text>
  <!-- Bristow -->
  <circle cx="115" cy="108" r="5" fill="#f97316"/>
  <text x="115" y="100" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">Bristow</text>
</svg>
